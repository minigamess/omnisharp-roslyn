name: Publish NuGet Global Tool

on:
  release:
    types: [created]
  push:
    branches:
      - master
    paths:
      - 'src/OmniSharp.Stdio.Driver/**'

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '6.0.x'

      - name: Restore dependencies
        run: dotnet restore src/OmniSharp.Stdio.Driver/OmniSharp.Stdio.Driver.csproj

      - name: Build
        run: dotnet build src/OmniSharp.Stdio.Driver/OmniSharp.Stdio.Driver.csproj -c Release --no-restore

      - name: Pack
        run: dotnet pack src/OmniSharp.Stdio.Driver/OmniSharp.Stdio.Driver.csproj -c Release --no-build -o ./nupkg

      - name: Publish to NuGet
        if: github.event_name == 'release'
        run: |
          dotnet nuget push ./nupkg/*.nupkg \
            --api-key ${{ secrets.NUGET_API_KEY }} \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
